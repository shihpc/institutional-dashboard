<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法人儀表板</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --cyan: #00d4ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #e3b341;
    --text: #c9d1d9;
    --muted: #8b949e;
    --tab-active: #1f6feb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; font-size: 14px; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 18px; color: var(--cyan); letter-spacing: 1px; }
  #meta { font-size: 12px; color: var(--muted); }
  #refresh-btn {
    background: var(--tab-active);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
  }
  #refresh-btn:hover { opacity: 0.85; }

  nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  nav button {
    flex: 1;
    min-width: 100px;
    padding: 10px 8px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
    transition: color 0.2s;
  }
  nav button.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  nav button:hover { color: var(--text); }

  .tab-content { display: none; padding: 12px; }
  .tab-content.active { display: block; }

  .search-bar { margin-bottom: 10px; display: flex; gap: 8px; }
  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
  }
  .search-bar input:focus { outline: none; border-color: var(--cyan); }

  .count-badge { font-size: 12px; color: var(--muted); margin-bottom: 6px; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--surface);
    color: var(--muted);
    font-weight: 600;
    padding: 8px 10px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  thead th.left { text-align: left; }
  thead th.sort-asc::after { content: ' ▲'; color: var(--cyan); }
  thead th.sort-desc::after { content: ' ▼'; color: var(--cyan); }
  thead th.group-header {
    text-align: center;
    font-size: 11px;
    color: var(--cyan);
    background: #0d1f33;
    cursor: default;
  }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: #1c2128; }
  td { padding: 7px 10px; text-align: right; white-space: nowrap; }
  td.left { text-align: left; }

  .rank { color: var(--muted); font-size: 12px; }
  .stock-id { color: var(--cyan); font-weight: 600; }
  .stock-name { color: var(--text); }
  .close-price { color: var(--yellow); }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neutral { color: var(--muted); }
  .vol { color: #a5d6ff; }

  .etf-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
    background: #1a3a1a;
    color: var(--green);
  }
  .etf-badge.bond { background: #3a2a10; color: var(--yellow); }

  #loading { text-align: center; padding: 60px; color: var(--muted); font-size: 16px; }
  #error-msg { display: none; text-align: center; padding: 40px; color: var(--red); }

  .summary-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    min-width: 160px;
    flex: 1;
  }
  .summary-card .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .summary-card .value { font-size: 16px; font-weight: 700; }
</style>
</head>
<body>

<header>
  <h1>⚡ 法人儀表板</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="meta">載入中...</span>
    <button id="refresh-btn" onclick="triggerUpdate()">手動更新</button>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('etf', this)">ETF 排行</button>
  <button onclick="switchTab('trust', this)">投信買超</button>
  <button onclick="switchTab('foreign', this)">外資買超</button>
  <button onclick="switchTab('sync', this)">同步買超</button>
</nav>

<div id="loading">資料載入中...</div>
<div id="error-msg">⚠️ 資料載入失敗，請稍後再試</div>

<!-- ETF排行 -->
<div id="tab-etf" class="tab-content active" style="display:none;">
  <div id="summary-etf" class="summary-bar"></div>
  <div class="search-bar">
    <input type="text" id="search-etf" placeholder="搜尋代號或名稱..." oninput="filterTable('etf')">
  </div>
  <div id="count-etf" class="count-badge"></div>
  <div class="table-wrap">
    <table id="table-etf">
      <thead>
        <tr>
          <th class="left" onclick="sortTable('etf',0)">排</th>
          <th class="left" onclick="sortTable('etf',1)">代號</th>
          <th class="left" onclick="sortTable('etf',2)">名稱</th>
          <th onclick="sortTable('etf',3)">收盤</th>
          <th onclick="sortTable('etf',4)">成交量(張)</th>
          <th onclick="sortTable('etf',5)">成交額(億)</th>
          <th onclick="sortTable('etf',6)">外資買超</th>
          <th onclick="sortTable('etf',7)">投信買超</th>
          <th onclick="sortTable('etf',8)">自營買超</th>
        </tr>
      </thead>
      <tbody id="tbody-etf"></tbody>
    </table>
  </div>
</div>

<!-- 投信買超 -->
<div id="tab-trust" class="tab-content" style="display:none;">
  <div class="search-bar">
    <input type="text" id="search-trust" placeholder="搜尋代號或名稱..." oninput="filterTable('trust')">
  </div>
  <div id="count-trust" class="count-badge"></div>
  <div class="table-wrap">
    <table id="table-trust">
      <thead>
        <tr>
          <th class="left" rowspan="2" onclick="sortTable('trust',0)">排</th>
          <th class="left" rowspan="2" onclick="sortTable('trust',1)">代號</th>
          <th class="left" rowspan="2" onclick="sortTable('trust',2)">名稱</th>
          <th rowspan="2" onclick="sortTable('trust',3)">收盤</th>
          <th rowspan="2" onclick="sortTable('trust',4)">漲跌%</th>
          <th class="group-header" colspan="2">近1日</th>
          <th class="group-header" colspan="2">近5日</th>
          <th class="group-header" colspan="2">近10日</th>
        </tr>
        <tr>
          <th onclick="sortTable('trust',5)">買超(張)</th>
          <th onclick="sortTable('trust',6)">量比%</th>
          <th onclick="sortTable('trust',7)">買超(張)</th>
          <th onclick="sortTable('trust',8)">量比%</th>
          <th onclick="sortTable('trust',9)">買超(張)</th>
          <th onclick="sortTable('trust',10)">量比%</th>
        </tr>
      </thead>
      <tbody id="tbody-trust"></tbody>
    </table>
  </div>
</div>

<!-- 外資買超 -->
<div id="tab-foreign" class="tab-content" style="display:none;">
  <div class="search-bar">
    <input type="text" id="search-foreign" placeholder="搜尋代號或名稱..." oninput="filterTable('foreign')">
  </div>
  <div id="count-foreign" class="count-badge"></div>
  <div class="table-wrap">
    <table id="table-foreign">
      <thead>
        <tr>
          <th class="left" rowspan="2" onclick="sortTable('foreign',0)">排</th>
          <th class="left" rowspan="2" onclick="sortTable('foreign',1)">代號</th>
          <th class="left" rowspan="2" onclick="sortTable('foreign',2)">名稱</th>
          <th rowspan="2" onclick="sortTable('foreign',3)">收盤</th>
          <th rowspan="2" onclick="sortTable('foreign',4)">漲跌%</th>
          <th rowspan="2" onclick="sortTable('foreign',5)">外資持股%</th>
          <th class="group-header" colspan="2">近1日</th>
          <th class="group-header" colspan="2">近5日</th>
          <th class="group-header" colspan="2">近10日</th>
        </tr>
        <tr>
          <th onclick="sortTable('foreign',6)">買超(張)</th>
          <th onclick="sortTable('foreign',7)">量比%</th>
          <th onclick="sortTable('foreign',8)">買超(張)</th>
          <th onclick="sortTable('foreign',9)">量比%</th>
          <th onclick="sortTable('foreign',10)">買超(張)</th>
          <th onclick="sortTable('foreign',11)">量比%</th>
        </tr>
      </thead>
      <tbody id="tbody-foreign"></tbody>
    </table>
  </div>
</div>

<!-- 同步買超 -->
<div id="tab-sync" class="tab-content" style="display:none;">
  <div class="search-bar">
    <input type="text" id="search-sync" placeholder="搜尋代號或名稱..." oninput="filterTable('sync')">
  </div>
  <div id="count-sync" class="count-badge"></div>
  <div class="table-wrap">
    <table id="table-sync">
      <thead>
        <tr>
          <th class="left" rowspan="2" onclick="sortTable('sync',0)">排</th>
          <th class="left" rowspan="2" onclick="sortTable('sync',1)">代號</th>
          <th class="left" rowspan="2" onclick="sortTable('sync',2)">名稱</th>
          <th rowspan="2" onclick="sortTable('sync',3)">收盤</th>
          <th rowspan="2" onclick="sortTable('sync',4)">漲跌%</th>
          <th class="group-header" colspan="3">近1日</th>
          <th class="group-header" colspan="3">近5日</th>
        </tr>
        <tr>
          <th onclick="sortTable('sync',5)">投信(張)</th>
          <th onclick="sortTable('sync',6)">外資(張)</th>
          <th onclick="sortTable('sync',7)">合計(張)</th>
          <th onclick="sortTable('sync',8)">投信(張)</th>
          <th onclick="sortTable('sync',9)">外資(張)</th>
          <th onclick="sortTable('sync',10)">合計(張)</th>
        </tr>
      </thead>
      <tbody id="tbody-sync"></tbody>
    </table>
  </div>
</div>

<script>
const GITHUB_OWNER = 'shihpc';
const GITHUB_REPO  = 'institutional-dashboard';
const DATA_URL     = 'data/etf.json';

let allData = {};
let sortState = {};

function fmt(v, digits = 0) {
  if (v === null || v === undefined || isNaN(Number(v))) return '-';
  const n = Number(v);
  if (digits === 0) return Math.round(n).toLocaleString();
  return n.toFixed(digits);
}

function fmtVol(v) {
  // Trading_Volume is in shares; 1張=1000股
  if (!v) return '-';
  return Math.round(Number(v) / 1000).toLocaleString();
}

function dc(v) {
  const n = Number(v);
  if (n > 0) return 'pos';
  if (n < 0) return 'neg';
  return 'neutral';
}

function renderETF(items, summary) {
  // Summary cards
  const bar = document.getElementById('summary-etf');
  bar.innerHTML = (summary || []).map(s => `
    <div class="summary-card">
      <div class="label">${s.label}</div>
      <div class="value vol">${Math.round(s.volume / 1000).toLocaleString()} 張</div>
      <div style="font-size:12px;margin-top:4px;">
        外資 <span class="${dc(s.foreign_net)}">${s.foreign_net > 0 ? '+' : ''}${Math.round(s.foreign_net / 1000).toLocaleString()}</span>
        投信 <span class="${dc(s.trust_net)}">${s.trust_net > 0 ? '+' : ''}${Math.round(s.trust_net / 1000).toLocaleString()}</span>
      </div>
    </div>`).join('');

  const tbody = document.getElementById('tbody-etf');
  tbody.innerHTML = (items || []).map(r => {
    const badge = r.bond
      ? `<span class="etf-badge bond">債</span>`
      : `<span class="etf-badge">股</span>`;
    return `<tr data-search="${r.stock_id} ${r.stock_name}">
      <td class="left rank">${r.rank}</td>
      <td class="left stock-id">${r.stock_id}</td>
      <td class="left stock-name">${r.stock_name}${badge}</td>
      <td class="close-price">${fmt(r.close, 2)}</td>
      <td class="vol">${fmtVol(r.volume)}</td>
      <td class="vol">${fmt(r.money_b, 2)}</td>
      <td class="${dc(r.foreign_net)}">${fmt(r.foreign_net / 1000)}</td>
      <td class="${dc(r.trust_net)}">${fmt(r.trust_net / 1000)}</td>
      <td class="${dc(r.dealer_net)}">${fmt(r.dealer_net / 1000)}</td>
    </tr>`;
  }).join('');
  document.getElementById('count-etf').textContent = `共 ${(items || []).length} 支 ETF`;
}

function renderTrust(data) {
  const tbody = document.getElementById('tbody-trust');
  tbody.innerHTML = (data || []).map(r => `
    <tr data-search="${r.stock_id} ${r.stock_name}">
      <td class="left rank">${r.rank}</td>
      <td class="left stock-id">${r.stock_id}</td>
      <td class="left stock-name">${r.stock_name}</td>
      <td class="close-price">${fmt(r.close, 2)}</td>
      <td class="${dc(r.close_chg)}">${r.close_chg > 0 ? '+' : ''}${fmt(r.close_chg, 2)}%</td>
      <td class="${dc(r.d1.diff)}">${fmt(r.d1.diff / 1000)}</td>
      <td class="neutral">${fmt(r.d1.vol_ratio, 1)}%</td>
      <td class="${dc(r.d5.diff)}">${fmt(r.d5.diff / 1000)}</td>
      <td class="neutral">${fmt(r.d5.vol_ratio, 1)}%</td>
      <td class="${dc(r.d10.diff)}">${fmt(r.d10.diff / 1000)}</td>
      <td class="neutral">${fmt(r.d10.vol_ratio, 1)}%</td>
    </tr>`).join('');
  document.getElementById('count-trust').textContent = `共 ${(data || []).length} 支`;
}

function renderForeign(data) {
  const tbody = document.getElementById('tbody-foreign');
  tbody.innerHTML = (data || []).map(r => `
    <tr data-search="${r.stock_id} ${r.stock_name}">
      <td class="left rank">${r.rank}</td>
      <td class="left stock-id">${r.stock_id}</td>
      <td class="left stock-name">${r.stock_name}</td>
      <td class="close-price">${fmt(r.close, 2)}</td>
      <td class="${dc(r.close_chg)}">${r.close_chg > 0 ? '+' : ''}${fmt(r.close_chg, 2)}%</td>
      <td class="neutral">${r.foreign_ratio != null ? fmt(r.foreign_ratio, 1) + '%' : '-'}</td>
      <td class="${dc(r.d1.diff)}">${fmt(r.d1.diff / 1000)}</td>
      <td class="neutral">${fmt(r.d1.vol_ratio, 1)}%</td>
      <td class="${dc(r.d5.diff)}">${fmt(r.d5.diff / 1000)}</td>
      <td class="neutral">${fmt(r.d5.vol_ratio, 1)}%</td>
      <td class="${dc(r.d10.diff)}">${fmt(r.d10.diff / 1000)}</td>
      <td class="neutral">${fmt(r.d10.vol_ratio, 1)}%</td>
    </tr>`).join('');
  document.getElementById('count-foreign').textContent = `共 ${(data || []).length} 支`;
}

function renderSync(data) {
  const tbody = document.getElementById('tbody-sync');
  tbody.innerHTML = (data || []).map(r => `
    <tr data-search="${r.stock_id} ${r.stock_name}">
      <td class="left rank">${r.rank}</td>
      <td class="left stock-id">${r.stock_id}</td>
      <td class="left stock-name">${r.stock_name}</td>
      <td class="close-price">${fmt(r.close, 2)}</td>
      <td class="${dc(r.close_chg)}">${r.close_chg > 0 ? '+' : ''}${fmt(r.close_chg, 2)}%</td>
      <td class="${dc(r.d1.trust)}">${fmt(r.d1.trust / 1000)}</td>
      <td class="${dc(r.d1.foreign)}">${fmt(r.d1.foreign / 1000)}</td>
      <td class="${dc(r.d1.total)}" style="font-weight:600">${fmt(r.d1.total / 1000)}</td>
      <td class="${dc(r.d5.trust)}">${fmt(r.d5.trust / 1000)}</td>
      <td class="${dc(r.d5.foreign)}">${fmt(r.d5.foreign / 1000)}</td>
      <td class="${dc(r.d5.total)}" style="font-weight:600">${fmt(r.d5.total / 1000)}</td>
    </tr>`).join('');
  document.getElementById('count-sync').textContent = `共 ${(data || []).length} 支`;
}

async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    allData = d;

    document.getElementById('meta').textContent =
      `資料日期：${d.date}　更新：${d.updated_at}`;

    renderETF(d.etf?.items, d.etf?.summary);
    renderTrust(d.trust);
    renderForeign(d.foreign);
    renderSync(d.sync);

    document.getElementById('loading').style.display = 'none';
    document.querySelectorAll('.tab-content.active').forEach(el => {
      el.style.display = 'block';
    });
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    console.error(e);
  }
}

function switchTab(key, btn) {
  document.querySelectorAll('.tab-content').forEach(el => {
    el.style.display = 'none';
    el.classList.remove('active');
  });
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const tab = document.getElementById('tab-' + key);
  tab.style.display = 'block';
  tab.classList.add('active');
  btn.classList.add('active');
}

function filterTable(key) {
  const q = document.getElementById('search-' + key).value.toLowerCase();
  const rows = document.querySelectorAll(`#tbody-${key} tr`);
  let visible = 0;
  rows.forEach(row => {
    const match = (row.dataset.search || '').toLowerCase().includes(q);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  const countEl = document.getElementById('count-' + key);
  if (countEl) {
    countEl.textContent = q
      ? `顯示 ${visible} / ${rows.length} 支`
      : `共 ${rows.length} 支`;
  }
}

function sortTable(key, colIdx) {
  const tbody = document.getElementById('tbody-' + key);
  const rows = Array.from(tbody.querySelectorAll('tr'));
  const ths = document.querySelectorAll(`#table-${key} thead th:not(.group-header)`);
  const stateKey = key + colIdx;
  const asc = sortState[stateKey] !== true;
  sortState[stateKey] = asc;

  ths.forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
  if (ths[colIdx]) ths[colIdx].classList.add(asc ? 'sort-asc' : 'sort-desc');

  rows.sort((a, b) => {
    const av = a.cells[colIdx]?.textContent.replace(/,|%|\+/g, '') || '';
    const bv = b.cells[colIdx]?.textContent.replace(/,|%|\+/g, '') || '';
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return asc ? an - bn : bn - an;
    return asc ? av.localeCompare(bv, 'zh-TW') : bv.localeCompare(av, 'zh-TW');
  });
  rows.forEach(r => tbody.appendChild(r));
}

async function triggerUpdate() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '觸發中...';
  btn.disabled = true;
  try {
    const resp = await fetch(
      `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/etf.yml/dispatches`,
      {
        method: 'POST',
        headers: {
          'Accept': 'application/vnd.github+json',
          'Authorization': `Bearer ${getToken()}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' }),
      }
    );
    if (resp.status === 204) {
      btn.textContent = '✅ 已觸發';
      setTimeout(() => { btn.textContent = '手動更新'; btn.disabled = false; }, 3000);
    } else {
      throw new Error(resp.status);
    }
  } catch (e) {
    btn.textContent = '❌ 失敗';
    setTimeout(() => { btn.textContent = '手動更新'; btn.disabled = false; }, 3000);
  }
}

function getToken() {
  let t = localStorage.getItem('gh_token');
  if (!t) {
    t = prompt('請輸入 GitHub Personal Access Token\n(需有 workflow 權限，只存於本機)');
    if (t) localStorage.setItem('gh_token', t);
  }
  return t || '';
}

loadData();
</script>
</body>
</html>
