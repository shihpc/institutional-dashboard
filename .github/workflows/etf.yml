name: 法人儀表板更新

on:
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD)，留空=最近交易日'
        required: false
        default: ''
  schedule:
    - cron: '0 12 * * 1-5'   # 20:00 TW (UTC 12:00) - FinMind 法人資料更新時間
    - cron: '30 12 * * 1-5'  # 20:30 TW (UTC 12:30) - 若稍晚發布
    - cron: '0 13 * * 1-5'   # 21:00 TW (UTC 13:00) - 最後補跑

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETF scanner
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SCAN_DATE: ${{ github.event.inputs.date }}
        run: python etf_scanner.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf.json
          if git diff --staged --quiet; then
            echo "資料無變更，跳過 commit"
          else
            git commit -m "法人資料更新 $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase
            git push
          fi
