<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法人儀表板</title>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --border:#30363d;
  --cyan:#00d4ff; --green:#3fb950; --red:#f85149;
  --yellow:#e3b341; --text:#c9d1d9; --muted:#8b949e;
  --blue:#1f6feb; --purple:#bc8cff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:13px}

header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200
}
header h1{font-size:17px;color:var(--cyan);letter-spacing:1px}
#meta{font-size:11px;color:var(--muted)}
#refresh-btn{
  background:var(--blue);color:#fff;border:none;border-radius:5px;
  padding:5px 12px;cursor:pointer;font-size:12px
}
#refresh-btn:hover{opacity:.85}

/* ── Main nav ── */
.main-nav{
  display:flex;background:var(--surface);border-bottom:2px solid var(--border);
  overflow-x:auto
}
.main-nav button{
  flex:1;min-width:80px;padding:9px 6px;background:none;border:none;
  border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;
  font-size:13px;white-space:nowrap;transition:color .15s;margin-bottom:-2px
}
.main-nav button.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.main-nav button:hover:not(.active){color:var(--text)}

/* ── Sub nav ── */
.sub-nav{
  display:flex;flex-wrap:wrap;gap:4px;padding:8px 12px;
  background:#0f151c;border-bottom:1px solid var(--border)
}
.sub-nav button{
  padding:4px 10px;background:var(--surface);border:1px solid var(--border);
  border-radius:4px;color:var(--muted);cursor:pointer;font-size:12px;white-space:nowrap
}
.sub-nav button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.sub-nav button:hover:not(.active){color:var(--text)}

/* ── Content ── */
.content{padding:10px 12px}
.search-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.search-row input{
  flex:1;max-width:260px;background:var(--surface);border:1px solid var(--border);
  border-radius:5px;color:var(--text);padding:5px 9px;font-size:12px
}
.search-row input:focus{outline:none;border-color:var(--cyan)}
.count{font-size:11px;color:var(--muted)}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{
  background:var(--surface);color:var(--muted);font-weight:600;
  padding:7px 9px;text-align:right;border-bottom:1px solid var(--border);
  position:sticky;top:0;cursor:pointer;white-space:nowrap;user-select:none
}
thead th.left{text-align:left}
thead th.group{
  text-align:center;font-size:10px;color:var(--cyan);background:#0d1f33;
  cursor:default
}
thead th.sort-asc::after{content:' ▲';color:var(--cyan)}
thead th.sort-desc::after{content:' ▼';color:var(--cyan)}

tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:hover{background:#1c2128}
td{padding:6px 9px;text-align:right;white-space:nowrap}
td.left{text-align:left}

.rank{color:var(--muted);font-size:11px}
.sid{color:var(--cyan);font-weight:600}
.name{color:var(--text)}
.price{color:var(--yellow)}
.pos{color:var(--green)}
.neg{color:var(--red)}
.neu{color:var(--muted)}
.vol{color:#a5d6ff}
.bond-badge{
  display:inline-block;font-size:9px;padding:1px 4px;border-radius:3px;
  margin-left:3px;background:#3a2a10;color:var(--yellow)
}
.eq-badge{
  display:inline-block;font-size:9px;padding:1px 4px;border-radius:3px;
  margin-left:3px;background:#1a3a1a;color:var(--green)
}

/* ── Summary table ── */
.summary-tbl td:first-child{text-align:left;color:var(--cyan);font-weight:600}

/* ── States ── */
#loading{text-align:center;padding:60px;color:var(--muted);font-size:16px}
#error-msg{display:none;text-align:center;padding:40px;color:var(--red)}
</style>
</head>
<body>

<header>
  <h1>⚡ 法人儀表板</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="meta">載入中...</span>
    <button id="refresh-btn" onclick="triggerUpdate()">手動更新</button>
  </div>
</header>

<div id="loading">資料載入中...</div>
<div id="error-msg">⚠️ 資料載入失敗，請稍後再試</div>

<div id="app" style="display:none">
  <nav class="main-nav" id="main-nav"></nav>
  <div class="sub-nav" id="sub-nav"></div>
  <div class="content">
    <div class="search-row">
      <input type="text" id="search-box" placeholder="搜尋代號或名稱..." oninput="onSearch()">
      <span class="count" id="count-badge"></span>
    </div>
    <div class="table-wrap" id="table-area"></div>
  </div>
</div>

<script>
const GITHUB_OWNER = 'shihpc';
const GITHUB_REPO  = 'institutional-dashboard';
const DATA_URL     = 'data/etf.json';

let D = {};   // full JSON
let sortState = {};

// ── tab config ───────────────────────────────────────────────────────────────

const TABS = [
  {
    key: 'etf', label: 'ETF 排行',
    subs: [
      {key:'vol_nb',  label:'非債-成交量'},
      {key:'vol_b',   label:'債券-成交量'},
      {key:'mv_nb',   label:'非債-市值'},
      {key:'mv_b',    label:'債券-市值'},
      {key:'sum',     label:'匯總'},
    ],
    getData(d, sk) {
      if (sk==='vol_nb') return d.etf.volume.non_bond;
      if (sk==='vol_b')  return d.etf.volume.bond;
      if (sk==='mv_nb')  return d.etf.mktval.non_bond;
      if (sk==='mv_b')   return d.etf.mktval.bond;
      if (sk==='sum')    return d.etf.summary;
      return [];
    },
    buildTable(rows, sk) {
      if (sk === 'sum') return buildEtfSummaryTable(rows);
      return buildEtfRankTable(rows);
    }
  },
  {
    key: 'trust', label: '投信買賣',
    subs: [
      {key:'d1.buy',    label:'1日買超(金額)'},
      {key:'d1.sell',   label:'1日賣超(金額)'},
      {key:'d5.buy',    label:'5日買超(金額)'},
      {key:'d5.sell',   label:'5日賣超(金額)'},
      {key:'d20.buy',   label:'20日買超(金額)'},
      {key:'d20.sell',  label:'20日賣超(金額)'},
      {key:'d1.buy_vr', label:'1日買超(量比)'},
      {key:'d1.sell_vr',label:'1日賣超(量比)'},
      {key:'d5.buy_vr', label:'5日買超(量比)'},
      {key:'d5.sell_vr',label:'5日賣超(量比)'},
      {key:'d20.buy_vr',label:'20日買超(量比)'},
      {key:'d20.sell_vr',label:'20日賣超(量比)'},
    ],
    getData(d, sk) { return getDeep(d.trust, sk); },
    buildTable(rows, sk) {
      return buildEntityTable(rows, sk, false);
    }
  },
  {
    key: 'foreign', label: '外資買賣',
    subs: [
      {key:'d1.buy',    label:'1日買超(金額)'},
      {key:'d1.sell',   label:'1日賣超(金額)'},
      {key:'d5.buy',    label:'5日買超(金額)'},
      {key:'d5.sell',   label:'5日賣超(金額)'},
      {key:'d20.buy',   label:'20日買超(金額)'},
      {key:'d20.sell',  label:'20日賣超(金額)'},
      {key:'d1.buy_vr', label:'1日買超(量比)'},
      {key:'d1.sell_vr',label:'1日賣超(量比)'},
      {key:'d5.buy_vr', label:'5日買超(量比)'},
      {key:'d5.sell_vr',label:'5日賣超(量比)'},
      {key:'d20.buy_vr',label:'20日買超(量比)'},
      {key:'d20.sell_vr',label:'20日賣超(量比)'},
    ],
    getData(d, sk) { return getDeep(d.foreign, sk); },
    buildTable(rows, sk) {
      return buildEntityTable(rows, sk, true);
    }
  },
  {
    key: 'sync', label: '同步買賣',
    subs: [
      {key:'d1.buy',         label:'1日同步買超'},
      {key:'d1.sell',        label:'1日同步賣超'},
      {key:'d5.buy',         label:'5日同步買超'},
      {key:'d5.sell',        label:'5日同步賣超'},
      {key:'trust_vol.d1',   label:'投信量比(1日)'},
      {key:'trust_vol.d5',   label:'投信量比(5日)'},
      {key:'foreign_vol.d1', label:'外資量比(1日)'},
      {key:'foreign_vol.d5', label:'外資量比(5日)'},
    ],
    getData(d, sk) { return getDeep(d.sync, sk); },
    buildTable(rows, sk) {
      return buildSyncTable(rows, sk);
    }
  },
];

let curMain = 'etf';
let curSub  = 'vol_nb';

// ── helpers ──────────────────────────────────────────────────────────────────

function getDeep(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined ? o[k] : []), obj);
}

function fmt(v, d = 0) {
  if (v === null || v === undefined || v === '' || isNaN(+v)) return '-';
  const n = +v;
  if (d === 0) return Math.round(n).toLocaleString();
  return n.toFixed(d);
}

function fmtSign(v, d = 0) {
  const n = +v;
  if (!isFinite(n) || n === 0) return '<span class="neu">-</span>';
  const cls = n > 0 ? 'pos' : 'neg';
  const s   = n > 0 ? '+' : '';
  return `<span class="${cls}">${s}${fmt(n, d)}</span>`;
}

function dc(v) {
  const n = +v;
  if (n > 0) return 'pos';
  if (n < 0) return 'neg';
  return 'neu';
}

function th(label, colIdx, tabId, left = false, group = false) {
  if (group) return `<th class="group" colspan="${colIdx}">${label}</th>`;
  return `<th class="${left ? 'left' : ''}" onclick="sortCol('${tabId}',${colIdx})">${label}</th>`;
}

// ── ETF tables ───────────────────────────────────────────────────────────────

function buildEtfRankTable(rows) {
  const hdr = `<thead><tr>
    ${th('排',0,'etf',true)} ${th('代號',1,'etf',true)} ${th('名稱',2,'etf',true)}
    ${th('收盤',3,'etf')} ${th('成交量(張)',4,'etf')} ${th('成交額(億)',5,'etf')} ${th('市值(億)',6,'etf')}
    ${th('外資(張)',7,'etf')} ${th('投信(張)',8,'etf')} ${th('自營(張)',9,'etf')}
  </tr></thead>`;
  const body = rows.map(r => {
    const badge = r.bond
      ? `<span class="bond-badge">債</span>`
      : `<span class="eq-badge">股</span>`;
    return `<tr data-search="${r.stock_id} ${r.stock_name}">
      <td class="left rank">${r.rank}</td>
      <td class="left sid">${r.stock_id}</td>
      <td class="left name">${r.stock_name}${badge}</td>
      <td class="price">${fmt(r.close, 2)}</td>
      <td class="vol">${fmt(r.vol_k)}</td>
      <td class="vol">${fmt(r.money_b, 2)}</td>
      <td class="vol">${fmt(r.mktval_b, 2)}</td>
      <td class="${dc(r.foreign_net_lots)}">${fmtSign(r.foreign_net_lots, 1)}</td>
      <td class="${dc(r.trust_net_lots)}">${fmtSign(r.trust_net_lots, 1)}</td>
      <td class="${dc(r.dealer_net_lots)}">${fmtSign(r.dealer_net_lots, 1)}</td>
    </tr>`;
  }).join('');
  return `<table id="tbl-etf"><${hdr}<tbody>${body}</tbody></table>`;
}

function buildEtfSummaryTable(rows) {
  const hdr = `<thead><tr>
    <th class="left" style="cursor:default">類別</th>
    <th style="cursor:default">成交量(張)</th>
    <th style="cursor:default">成交額(億)</th>
    <th style="cursor:default">市值(億)</th>
    <th style="cursor:default">外資買超(千元)</th>
    <th style="cursor:default">投信買超(千元)</th>
    <th style="cursor:default">自營買超(千元)</th>
  </tr></thead>`;
  const body = rows.map(r => `<tr class="summary-tbl">
    <td class="left">${r.label}</td>
    <td class="vol">${fmt(r.vol_k)}</td>
    <td class="vol">${fmt(r.money_b, 2)}</td>
    <td class="vol">${fmt(r.mktval_b, 2)}</td>
    <td class="${dc(r.foreign_net_k)}">${fmtSign(r.foreign_net_k)}</td>
    <td class="${dc(r.trust_net_k)}">${fmtSign(r.trust_net_k)}</td>
    <td class="${dc(r.dealer_net_k)}">${fmtSign(r.dealer_net_k)}</td>
  </tr>`).join('');
  return `<table><${hdr}<tbody>${body}</tbody></table>`;
}

// ── 投信/外資 tables ──────────────────────────────────────────────────────────

function isVolRatio(sk) { return sk.includes('_vr'); }

function getPeriod(sk) {
  if (sk.startsWith('d1')) return '1日';
  if (sk.startsWith('d5')) return '5日';
  if (sk.startsWith('d20')) return '20日';
  return '';
}

function buildEntityTable(rows, sk, hasForeign) {
  const vr   = isVolRatio(sk);
  const isBuy = sk.includes('buy');
  const netLabel = isBuy ? '買超' : '賣超';
  const tid = hasForeign ? 'foreign' : 'trust';

  let cols, rowFn;
  if (vr) {
    // 量比排行
    cols = `<tr>
      ${th('排',0,tid,true)} ${th('代號',1,tid,true)} ${th('名稱',2,tid,true)}
      ${th('收盤',3,tid)} ${th('漲跌%',4,tid)} ${th('量比%',5,tid)}
      ${th(`${netLabel}(千元)`,6,tid)} ${th(`${netLabel}(張)`,7,tid)} ${th('乖離率%',8,tid)}
      ${hasForeign ? `${th('持股%',9,tid)} ${th('持股(張)',10,tid)} ${th('持股市值(M)',11,tid)} ${th('持股變動%',12,tid)}` : ''}
    </tr>`;
    const netK  = sk.startsWith('d1') ? 'd1_net_k' : sk.startsWith('d5') ? 'd5_net_k' : 'd20_net_k';
    const lots  = sk.startsWith('d1') ? 'd1_lots'  : sk.startsWith('d5') ? 'd5_lots'  : 'd20_lots';
    const vrKey = sk.startsWith('d1') ? 'd1_vr'    : sk.startsWith('d5') ? 'd5_vr'    : 'd20_vr';
    rowFn = r => `<tr data-search="${r.stock_id} ${r.stock_name}">
      <td class="left rank">${r.rank}</td>
      <td class="left sid">${r.stock_id}</td>
      <td class="left name">${r.stock_name}</td>
      <td class="price">${fmt(r.close, 2)}</td>
      <td>${fmtSign(r.close_chg, 2)}</td>
      <td class="vol">${fmt(r[vrKey], 2)}</td>
      <td class="${dc(r[netK])}">${fmtSign(r[netK])}</td>
      <td class="${dc(r[lots])}">${fmtSign(r[lots], 1)}</td>
      <td class="${dc(r.ma20_bias)}">${fmtSign(r.ma20_bias, 2)}</td>
      ${hasForeign ? `
      <td class="neu">${r.hold_ratio ? fmt(r.hold_ratio, 1)+'%' : '-'}</td>
      <td class="neu">${r.hold_lots ? fmt(r.hold_lots) : '-'}</td>
      <td class="neu">${r.hold_mktval ? fmt(r.hold_mktval, 1) : '-'}</td>
      <td class="${dc(r.hold_chg)}">${r.hold_chg ? fmtSign(r.hold_chg, 2) : '-'}</td>` : ''}
    </tr>`;
  } else {
    // 金額排行
    const netK  = sk.startsWith('d1') ? 'd1_net_k' : sk.startsWith('d5') ? 'd5_net_k' : 'd20_net_k';
    const lots  = sk.startsWith('d1') ? 'd1_lots'  : sk.startsWith('d5') ? 'd5_lots'  : 'd20_lots';
    const vrKey = sk.startsWith('d1') ? 'd1_vr'    : sk.startsWith('d5') ? 'd5_vr'    : 'd20_vr';
    cols = `<tr>
      ${th('排',0,tid,true)} ${th('代號',1,tid,true)} ${th('名稱',2,tid,true)}
      ${th('收盤',3,tid)} ${th('漲跌%',4,tid)}
      ${th(`${netLabel}(千元)`,5,tid)} ${th(`${netLabel}(張)`,6,tid)} ${th('量比%',7,tid)} ${th('乖離率%',8,tid)}
      ${hasForeign ? `${th('持股%',9,tid)} ${th('持股(張)',10,tid)} ${th('持股市值(M)',11,tid)} ${th('持股變動%',12,tid)}` : ''}
    </tr>`;
    rowFn = r => `<tr data-search="${r.stock_id} ${r.stock_name}">
      <td class="left rank">${r.rank}</td>
      <td class="left sid">${r.stock_id}</td>
      <td class="left name">${r.stock_name}</td>
      <td class="price">${fmt(r.close, 2)}</td>
      <td>${fmtSign(r.close_chg, 2)}</td>
      <td class="${dc(r[netK])}">${fmtSign(r[netK])}</td>
      <td class="${dc(r[lots])}">${fmtSign(r[lots], 1)}</td>
      <td class="neu">${fmt(r[vrKey], 2)}</td>
      <td class="${dc(r.ma20_bias)}">${fmtSign(r.ma20_bias, 2)}</td>
      ${hasForeign ? `
      <td class="neu">${r.hold_ratio ? fmt(r.hold_ratio, 1)+'%' : '-'}</td>
      <td class="neu">${r.hold_lots ? fmt(r.hold_lots) : '-'}</td>
      <td class="neu">${r.hold_mktval ? fmt(r.hold_mktval, 1) : '-'}</td>
      <td class="${dc(r.hold_chg)}">${r.hold_chg ? fmtSign(r.hold_chg, 2) : '-'}</td>` : ''}
    </tr>`;
  }

  const body = rows.map(rowFn).join('');
  return `<table id="tbl-${tid}"><thead>${cols}</thead><tbody>${body}</tbody></table>`;
}

// ── 同步 tables ──────────────────────────────────────────────────────────────

function buildSyncTable(rows, sk) {
  const isVol = sk.includes('_vol');
  if (isVol) {
    const entity = sk.startsWith('trust') ? '投信' : '外資';
    const period = sk.endsWith('d1') ? '1' : '5';
    const netK = period === '1' ? (entity === '投信' ? 'd1_trust_k' : 'd1_foreign_k')
                                : (entity === '投信' ? 'd5_trust_k' : 'd5_foreign_k');
    const lots = period === '1' ? (entity === '投信' ? 'd1_total_lots' : 'd1_total_lots')
                                : (entity === '投信' ? 'd5_total_lots' : 'd5_total_lots');
    const vrKey = sk.includes('trust') ? (period==='1' ? 'd1_trust_vr' : 'd5_trust_vr')
                                       : (period==='1' ? 'd1_foreign_vr' : 'd5_foreign_vr');
    const cols = `<tr>
      ${th('排',0,'sync',true)} ${th('代號',1,'sync',true)} ${th('名稱',2,'sync',true)}
      ${th('收盤',3,'sync')} ${th('漲跌%',4,'sync')}
      ${th('量比%',5,'sync')} ${th(`${entity}買超(千元)`,6,'sync')} ${th('合計(張)',7,'sync')}
    </tr>`;
    const body = rows.map(r => `<tr data-search="${r.stock_id} ${r.stock_name}">
      <td class="left rank">${r.rank}</td>
      <td class="left sid">${r.stock_id}</td>
      <td class="left name">${r.stock_name}</td>
      <td class="price">${fmt(r.close, 2)}</td>
      <td>${fmtSign(r.close_chg, 2)}</td>
      <td class="vol">${fmt(r[vrKey], 2)}</td>
      <td class="${dc(r[netK])}">${fmtSign(r[netK])}</td>
      <td class="${dc(r.d1_total_lots)}">${fmtSign(r.d1_total_lots, 1)}</td>
    </tr>`).join('');
    return `<table id="tbl-sync"><thead>${cols}</thead><tbody>${body}</tbody></table>`;
  }

  const period = sk.startsWith('d1') ? '1' : '5';
  const tK = period === '1' ? 'd1_trust_k'   : 'd5_trust_k';
  const fK = period === '1' ? 'd1_foreign_k'  : 'd5_foreign_k';
  const totK = period === '1' ? 'd1_total_k'  : 'd5_total_k';
  const totL = period === '1' ? 'd1_total_lots': 'd5_total_lots';

  const cols = `<tr>
    ${th('排',0,'sync',true)} ${th('代號',1,'sync',true)} ${th('名稱',2,'sync',true)}
    ${th('收盤',3,'sync')} ${th('漲跌%',4,'sync')}
    ${th(`投信(千元)`,5,'sync')} ${th(`外資(千元)`,6,'sync')} ${th(`合計(千元)`,7,'sync')} ${th(`合計(張)`,8,'sync')}
  </tr>`;
  const body = rows.map(r => `<tr data-search="${r.stock_id} ${r.stock_name}">
    <td class="left rank">${r.rank}</td>
    <td class="left sid">${r.stock_id}</td>
    <td class="left name">${r.stock_name}</td>
    <td class="price">${fmt(r.close, 2)}</td>
    <td>${fmtSign(r.close_chg, 2)}</td>
    <td class="${dc(r[tK])}">${fmtSign(r[tK])}</td>
    <td class="${dc(r[fK])}">${fmtSign(r[fK])}</td>
    <td class="${dc(r[totK])}" style="font-weight:600">${fmtSign(r[totK])}</td>
    <td class="${dc(r[totL])}">${fmtSign(r[totL], 1)}</td>
  </tr>`).join('');
  return `<table id="tbl-sync"><thead>${cols}</thead><tbody>${body}</tbody></table>`;
}

// ── render ────────────────────────────────────────────────────────────────────

function render() {
  const tab = TABS.find(t => t.key === curMain);
  if (!tab) return;
  const rows = tab.getData(D, curSub);
  const html = tab.buildTable(rows || [], curSub);
  document.getElementById('table-area').innerHTML = html;
  updateCount();
}

function updateCount() {
  const tbody = document.querySelector('#table-area tbody');
  if (!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  document.getElementById('count-badge').textContent = `共 ${rows.length} 筆`;
}

function buildNav() {
  const mainNav = document.getElementById('main-nav');
  mainNav.innerHTML = TABS.map(t =>
    `<button onclick="switchMain('${t.key}',this)" class="${t.key===curMain?'active':''}">${t.label}</button>`
  ).join('');
}

function buildSubNav() {
  const tab = TABS.find(t => t.key === curMain);
  const subNav = document.getElementById('sub-nav');
  subNav.innerHTML = (tab.subs || []).map(s =>
    `<button onclick="switchSub('${s.key}',this)" class="${s.key===curSub?'active':''}">${s.label}</button>`
  ).join('');
}

function switchMain(key, btn) {
  curMain = key;
  const tab = TABS.find(t => t.key === key);
  curSub = tab.subs[0].key;
  document.querySelectorAll('.main-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildSubNav();
  document.getElementById('search-box').value = '';
  sortState = {};
  render();
}

function switchSub(key, btn) {
  curSub = key;
  document.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('search-box').value = '';
  sortState = {};
  render();
}

// ── search ────────────────────────────────────────────────────────────────────

function onSearch() {
  const q = document.getElementById('search-box').value.toLowerCase();
  const tbody = document.querySelector('#table-area tbody');
  if (!tbody) return;
  let vis = 0;
  tbody.querySelectorAll('tr').forEach(row => {
    const match = (row.dataset.search || '').toLowerCase().includes(q);
    row.style.display = match ? '' : 'none';
    if (match) vis++;
  });
  const total = tbody.querySelectorAll('tr').length;
  document.getElementById('count-badge').textContent = q
    ? `顯示 ${vis} / ${total} 筆`
    : `共 ${total} 筆`;
}

// ── sort ──────────────────────────────────────────────────────────────────────

function sortCol(tid, colIdx) {
  const tbl = document.getElementById('tbl-' + tid);
  if (!tbl) return;
  const tbody = tbl.querySelector('tbody');
  const rows  = Array.from(tbody.querySelectorAll('tr'));
  const ths   = Array.from(tbl.querySelectorAll('thead th:not(.group)'));
  const sk    = tid + colIdx;
  const asc   = sortState[sk] !== true;
  sortState[sk] = asc;
  ths.forEach(t => t.classList.remove('sort-asc','sort-desc'));
  if (ths[colIdx]) ths[colIdx].classList.add(asc ? 'sort-asc' : 'sort-desc');
  rows.sort((a, b) => {
    const av = (a.cells[colIdx]?.textContent || '').replace(/[,+%▲▼]/g,'').trim();
    const bv = (b.cells[colIdx]?.textContent || '').replace(/[,+%▲▼]/g,'').trim();
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return asc ? an - bn : bn - an;
    return asc ? av.localeCompare(bv,'zh-TW') : bv.localeCompare(av,'zh-TW');
  });
  rows.forEach(r => tbody.appendChild(r));
}

// ── load & trigger ────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    D = await r.json();
    document.getElementById('meta').textContent =
      `資料日期：${D.date}　更新：${D.updated_at}`;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    buildNav();
    buildSubNav();
    render();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    console.error(e);
  }
}

async function triggerUpdate() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '觸發中...';
  btn.disabled = true;
  try {
    const resp = await fetch(
      `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/etf.yml/dispatches`,
      {
        method: 'POST',
        headers: {
          'Accept': 'application/vnd.github+json',
          'Authorization': `Bearer ${getToken()}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ref: 'main'}),
      }
    );
    if (resp.status === 204) {
      btn.textContent = '✅ 已觸發';
      setTimeout(() => { btn.textContent = '手動更新'; btn.disabled = false; }, 3000);
    } else {
      throw new Error(resp.status);
    }
  } catch (e) {
    btn.textContent = '❌ 失敗';
    setTimeout(() => { btn.textContent = '手動更新'; btn.disabled = false; }, 3000);
  }
}

function getToken() {
  let t = localStorage.getItem('gh_token');
  if (!t) {
    t = prompt('請輸入 GitHub Personal Access Token\n(需有 workflow 權限，只存於本機)');
    if (t) localStorage.setItem('gh_token', t);
  }
  return t || '';
}

loadData();
</script>
